<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="JB monogram">
  <!-- minimal mark — just monogram + cursor, no circle, for tight spaces -->
  <g font-family="'Noto Serif JP', serif" font-weight="700" letter-spacing="-3">
    <text x="60" y="76" text-anchor="middle" font-size="64" fill="currentColor">JB</text>
  </g>
  <line x1="42" y1="92" x2="78" y2="92" stroke="#a8001a" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="92" x2="84" y2="92" stroke="#a8001a" stroke-width="3" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </line>
</svg>
