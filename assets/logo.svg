<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Josef Basner">
  <!-- outer captain's seal -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="currentColor" stroke-width="1.6" opacity="0.92"/>
  <!-- inner dashed ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="currentColor" stroke-width="0.6" stroke-dasharray="2.2 3" opacity="0.45"/>
  <!-- subtle cut / slash on top-right -->
  <line x1="93" y1="22" x2="106" y2="9" stroke="#a8001a" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="98" y1="18" x2="100" y2="20" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>

  <!-- JB monogram -->
  <g font-family="'Noto Serif JP', serif" font-weight="700" letter-spacing="-3">
    <text x="60" y="74" text-anchor="middle" font-size="48" fill="currentColor">JB</text>
  </g>

  <!-- cursor underline -->
  <line x1="47" y1="86" x2="73" y2="86" stroke="#a8001a" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="73" y1="86" x2="78" y2="86" stroke="#a8001a" stroke-width="2.4" stroke-linecap="round" opacity="0.55">
    <animate attributeName="opacity" values="0.55;0;0.55" dur="1.1s" repeatCount="indefinite"/>
  </line>
</svg>
